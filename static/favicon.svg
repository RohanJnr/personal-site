<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g fill="none" stroke="#2b2118" stroke-linecap="round" stroke-linejoin="round">
    <!-- rear wheel -->
    <circle cx="13" cy="50" r="10" stroke-width="2.4"/>
    <circle cx="13" cy="50" r="4" stroke-width="1"/>
    <circle cx="13" cy="50" r="1" fill="#2b2118"/>

    <!-- front wheel -->
    <circle cx="51" cy="50" r="10" stroke-width="2.4"/>
    <circle cx="51" cy="50" r="4" stroke-width="1"/>
    <circle cx="51" cy="50" r="1" fill="#2b2118"/>

    <!-- rear fender -->
    <path d="M5 42 Q13 36 21 42" stroke-width="1.4"/>

    <!-- front fender -->
    <path d="M43 42 Q51 36 59 42" stroke-width="1.4"/>

    <!-- frame backbone -->
    <path d="M18 50 L22 30 L44 22" stroke-width="2.2"/>
    <!-- frame downtube -->
    <path d="M30 34 L22 50" stroke-width="2"/>
    <!-- rear swingarm -->
    <path d="M22 42 L13 50" stroke-width="2"/>
    <!-- rear subframe -->
    <path d="M22 30 L12 34" stroke-width="1.6"/>

    <!-- engine block — big chunky parallel twin -->
    <rect x="22" y="33" width="16" height="13" rx="2" stroke-width="1.8"/>
    <!-- cylinder head top -->
    <rect x="24" y="29" width="12" height="5" rx="1" stroke-width="1.4"/>
    <!-- cooling fins -->
    <line x1="24" y1="36" x2="37" y2="36" stroke-width="0.7"/>
    <line x1="24" y1="39" x2="37" y2="39" stroke-width="0.7"/>
    <line x1="24" y1="42" x2="37" y2="42" stroke-width="0.7"/>

    <!-- fuel tank — big CB350 teardrop -->
    <path d="M20 26 Q26 16 38 18 L44 22 L44 26 Q34 30 20 26Z" stroke-width="1.8" fill="#d45a28" opacity="0.85"/>
    <!-- tank stripe -->
    <path d="M24 22 Q32 17 40 20" stroke-width="1" stroke="#fff" opacity="0.5"/>
    <!-- tank cap -->
    <circle cx="32" cy="20" r="1.2" stroke-width="0.8" fill="#2b2118"/>

    <!-- seat — long flat -->
    <path d="M10 30 Q14 24 20 26" stroke-width="2.5"/>
    <!-- seat surface -->
    <path d="M11 29 Q15 25 19 26.5" stroke-width="3" stroke="#3d3630" opacity="0.3"/>

    <!-- tail light -->
    <circle cx="9" cy="30.5" r="1.5" stroke-width="0.8" fill="#c44a4a"/>

    <!-- exhaust pipes — twin, sweeping back -->
    <path d="M26 46 L14 54 Q10 56 7 54" stroke-width="2"/>
    <path d="M26 44 L16 51 Q12 53 9 51" stroke-width="1.4"/>
    <!-- muffler ends -->
    <ellipse cx="6" cy="54" rx="2.5" ry="1.5" stroke-width="1.2" fill="#2b2118" opacity="0.15"/>
    <ellipse cx="8" cy="51" rx="2" ry="1.2" stroke-width="1" fill="#2b2118" opacity="0.1"/>

    <!-- front fork — thick telescopic -->
    <line x1="44" y1="22" x2="51" y2="42" stroke-width="2.5"/>
    <line x1="46" y1="22" x2="53" y2="42" stroke-width="1.2"/>
    <!-- fork chrome -->
    <line x1="47" y1="30" x2="50" y2="38" stroke-width="1.8" stroke="#7a7468" opacity="0.3"/>

    <!-- handlebars -->
    <path d="M44 20 L36 13" stroke-width="2.2"/>
    <path d="M44 20 L52 14" stroke-width="2.2"/>
    <!-- grips -->
    <line x1="34" y1="12" x2="37" y2="14" stroke-width="3" opacity="0.4"/>
    <line x1="51" y1="13" x2="54" y2="15" stroke-width="3" opacity="0.4"/>
    <!-- mirrors -->
    <circle cx="34" cy="11" r="1.5" stroke-width="0.8"/>
    <circle cx="54" cy="13" r="1.5" stroke-width="0.8"/>

    <!-- headlight — big round -->
    <circle cx="52" cy="30" r="4.5" stroke-width="1.8"/>
    <circle cx="52" cy="30" r="2.5" fill="#fde68a" opacity="0.5"/>

    <!-- chain -->
    <path d="M13 50 Q26 56 30 46" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  </g>
</svg>
